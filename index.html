<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css"/>
    <title>ToDoList</title>
</head>
<body>
    <h1>
        TO-DO-LIST
    </h1>
    <div class="box">
        <form id="todoForm">
            <label for="ToDo">What to do:</label>
            <input type="text" id="ToDo">
            <input type="submit" value="Submit">
        </form>
    </div>

    <div id="taskBox">
        <h1 id="header">TO-DO:</h1>
        <ul id="list">
            <!-- Your to-do items will be added here dynamically -->
        </ul>
    </div>

    <script src="script.js"></script> 
</body>
</html>
